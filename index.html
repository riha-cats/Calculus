<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculus</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loader" class="loader">
    <span class="loader-word">미적분학</span>
  </div>

  <main class="stage" hidden>
    <button id="settings-btn" class="settings-btn" aria-label="설정">설정</button>

    <div id="display" class="display"></div>

    <div class="input-shell">
      <input
        id="formula"
        class="formula-input"
        type="text"
        spellcheck="false"
        autocomplete="off"
        aria-label="function of x"
      />
    </div>

    <section class="panel">
      <div class="modes">
        <button class="mode-btn is-active" data-mode="tangent">접선의 기울기</button>
        <button class="mode-btn" data-mode="riemann">리만 합</button>
        <button class="mode-btn" data-mode="ftc">기본 정리</button>
      </div>

      <div class="graph-wrap">
        <canvas id="graph" class="graph"></canvas>
        <div id="tooltip" class="tooltip" hidden></div>
      </div>

      <div class="bar-wrap">
        <div id="bar-bubble" class="bar-bubble"></div>
        <input id="bar" class="bar" type="range" min="0" max="1" step="0.001" value="0.5" />
      </div>
      <div id="readout" class="readout"></div>
    </section>

    <div id="settings" class="modal" hidden>
      <div class="modal-card">
        <h2 class="modal-title">설정</h2>
        <p class="modal-desc">x축 범위</p>
        <div class="field-row">
          <label class="field">
            <span>x 최소</span>
            <input id="xmin" type="text" spellcheck="false" autocomplete="off" />
          </label>
          <label class="field">
            <span>x 최대</span>
            <input id="xmax" type="text" spellcheck="false" autocomplete="off" />
          </label>
        </div>
        <div class="modal-actions">
          <button id="settings-close" class="modal-btn">닫기</button>
          <button id="settings-apply" class="modal-btn is-primary">적용</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" defer></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
